<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 flex items-center justify-center h-screen">

<div class="w-full max-w-md bg-white rounded-2xl shadow-lg flex flex-col">

  <div class="p-3 bg-green-600 text-white text-center font-bold">Chat App</div>

  <!-- Login -->
  <div id="login" class="p-4">
    <input id="user" placeholder="Username" class="border p-2 w-full mb-2 rounded" />
    <input id="pass" type="password" placeholder="Password" class="border p-2 w-full mb-2 rounded" />
    <button onclick="login()" class="bg-green-600 text-white w-full p-2 rounded">Login</button>
  </div>

  <!-- Chat -->
  <div id="chat" class="hidden flex flex-col h-96">
    <div id="typing" class="text-sm text-gray-500 px-2"></div>
    <div id="box" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

    <input type="file" onchange="sendImage(event)" class="p-2" />

    <div class="flex p-2 gap-2">
      <input id="msg" oninput="typing()" class="flex-1 border p-2 rounded" placeholder="Type message..." />
      <button onclick="sendMsg()" class="bg-blue-500 text-white px-4 rounded">Send</button>
    </div>
  </div>

</div>

<script>
const socket = new WebSocket(`${location.origin.replace(/^http/, "ws")}/ws`);
let username = "";
let typingTimeout;

socket.onopen = () => console.log("✅ Connected");
socket.onerror = (e) => console.log("❌ WebSocket Error:", e);

socket.onmessage = (event) => {
  const data = JSON.parse(event.data);

  if(data.type === "login" && data.status === "success"){
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    data.history.forEach(show);
  }

  if(data.type === "message" || data.type === "image"){
    show(data);
    markSeen(data.id);
  }

  if(data.type === "delete"){
    const msg = document.querySelector(`[data-id='${data.id}']`);
    if(msg) msg.remove();
  }

  if(data.type === "typing"){
    document.getElementById("typing").innerText = data.user + " is typing...";
  }

  if(data.type === "stop_typing"){
    document.getElementById("typing").innerText = "";
  }

  if(data.type === "seen"){
    const msg = document.querySelector(`[data-id='${data.id}']`);
    if(msg){
      const seenText = msg.querySelector(".seen");
      if(seenText){
        const others = data.seen_by.filter(u => u !== username);
        seenText.innerText = "Seen: " + others.join(", ");
      }
    }
  }
};

// LOGIN
function login(){
  username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;
  if(username && password){
    socket.send(JSON.stringify({type:"login", username, password}));
  } else alert("Enter username and password");
}

// SEND MESSAGE
function sendMsg(){
  const text = document.getElementById("msg").value;
  if(text.trim() !== ""){
    socket.send(JSON.stringify({type:"message", user:username, text}));
    document.getElementById("msg").value = "";
  }
}

// SEND IMAGE
function sendImage(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = () => socket.send(JSON.stringify({type:"image", user:username, img:reader.result}));
    reader.readAsDataURL(file);
  }
}

// DELETE
function deleteMsg(id){
  socket.send(JSON.stringify({type:"delete", id:id}));
}

// TYPING
function typing(){
  socket.send(JSON.stringify({type:"typing", user:username}));
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(()=> socket.send(JSON.stringify({type:"stop_typing", user:username})), 1000);
}

// SEEN
function markSeen(id){
  socket.send(JSON.stringify({type:"seen", id:id}));
}

// SHOW MESSAGE / IMAGE
function show(data){
  const box = document.getElementById("box");
  const div = document.createElement("div");
  div.setAttribute("data-id", data.id);

  if(data.type === "message"){
    div.className = "bg-blue-100 p-2 rounded flex flex-col justify-between";
    div.innerHTML = `
      <span>${data.user}: ${data.text} (${data.time})</span>
      <button onclick="deleteMsg('${data.id}')" class="text-red-500">❌</button>
      <span class="seen text-xs text-gray-500">Seen: ${data.seen_by ? data.seen_by.filter(u=>u!==username).join(", ") : ""}</span>
    `;
  }

  if(data.type === "image"){
    div.className = "flex flex-col";
    div.innerHTML = `
      <b>${data.user}</b> (${data.time})<br>
      <img src="${data.img}" class="w-32 rounded"/>
      <button onclick="deleteMsg('${data.id}')" class="text-red-500">❌</button>
      <span class="seen text-xs text-gray-500">Seen: ${data.seen_by ? data.seen_by.filter(u=>u!==username).join(", ") : ""}</span>
    `;
  }

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
